career-profile:
    title: News
    summary: |
      * In September 2026, I will be appointed as Junior Professor and start a new Emmy Noether Group in Methods of AI titled "Earth Embeddings: Learning Concept Maps in Neural Nets". [Press release](https://www.uni-bonn.de/en/news/068-2026)
      * I will be on parental leave from May 2026 to September 2026, so emails and responses will be delayed.
      * [Arjun Rao](https://arjunashokrao.me/)'s ICLR 2026 paper, ["Measuring the Intrinsic Dimension of Earth Representations"](https://arxiv.org/abs/2511.02101), has been accepted for publication.
      * I am co-organizing the [ML4RS workshop at ICLR 2026 in Rio de Janeiro](https://ml-for-rs.github.io/iclr2026/) again this year.

