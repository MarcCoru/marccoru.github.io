research-community:
    title: Research
    summary: |
      Research in the [Machine Learning in Earth Observation Laboratory](https://meo-lab.github.io/) focuses on:

      * [Earth Embeddings and Geospatial Representation Learning](https://meo-lab.github.io/research/earth-embeddings/)
      * [Few-Shot Meta-Learning and Transfer Learning](https://meo-lab.github.io/research/few-shot-meta-learning/)
      * [Vegetation Extreme Event Modelling and Time Series Analysis](https://papers.ssrn.com/sol3/papers.cfm?abstract_id=6362223)
      * Application collaborations in marine litter monitoring, tree species classification, camera trap image analysis, and phenology prediction

      Further details are available on the [MEO Lab research pages](https://meo-lab.github.io/research/).

